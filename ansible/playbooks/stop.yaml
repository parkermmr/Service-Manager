---
- name: Stop All Services on Nodes
  hosts: nodes
  become: false
  
  tasks:
    - name: Stop all running services
      shell: |
        pkill 'prometheus' || true
        pkill 'node_exporter' || true
        pkill 'process_exporter' || true
      args:
        executable: /bin/bash
      
    - name: Verify services stopped
      shell: |
        pgrep 'prometheus' && echo "Prometheus still running" || echo "Prometheus stopped"
        pgrep 'node_exporter' && echo "Node Exporter still running" || echo "Node Exporter stopped"
        pgrep 'process_exporter' && echo "Process Exporter still running" || echo "Process Exporter stopped"
      register: service_status
      changed_when: false
      
    - name: Display service status
      debug:
        var: service_status.stdout_lines