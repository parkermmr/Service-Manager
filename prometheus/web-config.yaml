# web-config.yml for central Prometheus
# Enforces mTLS + basic auth on the central Prometheus server (port 9090).
# Grafana connects as a client using client.crt/client.key + basic auth.

tls_server_config:
  cert_file: /etc/prometheus/certs/server.crt
  key_file: /etc/prometheus/certs/server.key

  client_auth_type: RequireAndVerifyClientCert
  client_ca_file: /etc/prometheus/certs/ca.crt

  min_version: TLS13

basic_auth_users:
  # bcrypt hash of 'password' — matches prometheus_scrape_password_hash
  prometheus: "$2b$12$bIc61s6nfgxLmWP0TQAGzu6zftErKfGPofRFC3I.l7o24ePrSeBsK"
