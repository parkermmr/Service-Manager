##########################################
# PROMETHEUS CLUSTER CONFIGURATION
##########################################
# Central Prometheus - federates from each node's local Prometheus instance.
# Node exporters and process exporters are bound to 127.0.0.1 inside each
# container and scraped locally. Only Prometheus port 9090 is exposed.
#
# All federation scrapes use mTLS + basic auth against the node Prometheus
# instances. Certs are mounted at /etc/prometheus/certs.

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'node-cluster'
    environment: 'production'

##########################################
# ALERTING (OPTIONAL)
##########################################
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets:
#             - alertmanager:9093

##########################################
# ALERT RULES
##########################################
rule_files:
  - 'alerts.yaml'

##########################################
# SCRAPE CONFIGURATIONS
##########################################
scrape_configs:
  ##########################################
  # PROMETHEUS SELF-MONITORING (central)
  ##########################################
  - job_name: 'prometheus'
    scheme: https
    tls_config:
      ca_file: /etc/prometheus/certs/ca.crt
      cert_file: /etc/prometheus/certs/client.crt
      key_file: /etc/prometheus/certs/client.key
      insecure_skip_verify: true
    basic_auth:
      username: 'prometheus'
      password: 'password'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          instance: 'prometheus-central'

  ##########################################
  # NODE FEDERATION
  # Pulls node_exporter + process_exporter +
  # prometheus metrics from each node's local
  # Prometheus via the /federate endpoint.
  #
  # honor_labels: true preserves the instance/
  # hostname labels set by each node's local
  # Prometheus, so metrics stay correctly
  # attributed per-node.
  ##########################################
  - job_name: 'federate-node-1'
    honor_labels: true
    metrics_path: '/federate'
    scheme: https
    tls_config:
      ca_file: /etc/prometheus/certs/ca.crt
      cert_file: /etc/prometheus/certs/client.crt
      key_file: /etc/prometheus/certs/client.key
      insecure_skip_verify: true
    basic_auth:
      username: 'prometheus'
      password: 'password'
    params:
      'match[]':
        - '{job="node-exporter"}'
        - '{job="process-exporter"}'
        - '{job="prometheus"}'
    static_configs:
      - targets: ['host.docker.internal:9091']

  - job_name: 'federate-node-2'
    honor_labels: true
    metrics_path: '/federate'
    scheme: https
    tls_config:
      ca_file: /etc/prometheus/certs/ca.crt
      cert_file: /etc/prometheus/certs/client.crt
      key_file: /etc/prometheus/certs/client.key
      insecure_skip_verify: true
    basic_auth:
      username: 'prometheus'
      password: 'password'
    params:
      'match[]':
        - '{job="node-exporter"}'
        - '{job="process-exporter"}'
        - '{job="prometheus"}'
    static_configs:
      - targets: ['host.docker.internal:9092']

  - job_name: 'federate-node-3'
    honor_labels: true
    metrics_path: '/federate'
    scheme: https
    tls_config:
      ca_file: /etc/prometheus/certs/ca.crt
      cert_file: /etc/prometheus/certs/client.crt
      key_file: /etc/prometheus/certs/client.key
      insecure_skip_verify: true
    basic_auth:
      username: 'prometheus'
      password: 'password'
    params:
      'match[]':
        - '{job="node-exporter"}'
        - '{job="process-exporter"}'
        - '{job="prometheus"}'
    static_configs:
      - targets: ['host.docker.internal:9093']
