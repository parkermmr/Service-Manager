##########################################
# PROMETHEUS CLUSTER CONFIGURATION
##########################################
# Central Prometheus - federates from each node's local Prometheus instance.
# Node exporters and process exporters are bound to 127.0.0.1 inside each
# container and scraped locally. Only Prometheus port 9090 is exposed.

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'node-cluster'
    environment: 'production'

##########################################
# ALERTING (OPTIONAL)
##########################################
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets:
#             - alertmanager:9093

##########################################
# ALERT RULES
##########################################
rule_files:
  - 'alerts.yaml'

##########################################
# SCRAPE CONFIGURATIONS
##########################################
scrape_configs:
  ##########################################
  # PROMETHEUS SELF-MONITORING
  ##########################################
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          instance: 'prometheus-server'

  ##########################################
  # NODE FEDERATION
  # Pulls node_exporter + process_exporter
  # metrics from each node's local Prometheus
  # via the /federate endpoint.
  ##########################################
  - job_name: 'federate-node-1'
    honor_labels: true
    metrics_path: '/federate'
    params:
      match[]:
        - '{job="node-exporter"}'
        - '{job="process-exporter"}'
        - '{job="prometheus"}'
    static_configs:
      - targets: ['host.docker.internal:9091']
    relabel_configs:
      - target_label: instance
        replacement: 'node-1:9256'
      - target_label: hostname
        replacement: 'node-1'

  - job_name: 'federate-node-2'
    honor_labels: true
    metrics_path: '/federate'
    params:
      match[]:
        - '{job="node-exporter"}'
        - '{job="process-exporter"}'
        - '{job="prometheus"}'
    static_configs:
      - targets: ['host.docker.internal:9092']
    relabel_configs:
      - target_label: instance
        replacement: 'node-2:9256'
      - target_label: hostname
        replacement: 'node-2'

  - job_name: 'federate-node-3'
    honor_labels: true
    metrics_path: '/federate'
    params:
      match[]:
        - '{job="node-exporter"}'
        - '{job="process-exporter"}'
        - '{job="prometheus"}'
    static_configs:
      - targets: ['host.docker.internal:9093']
    relabel_configs:
      - target_label: instance
        replacement: 'node-3:9256'
      - target_label: hostname
        replacement: 'node-3'

  ##########################################
  # BLACKBOX EXPORTER (OPTIONAL)
